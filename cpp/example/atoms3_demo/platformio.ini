; PlatformIO project for the AtomS3 bouncing-ball demo.
; Target: M5Stack AtomS3 (ESP32-S3, 128x128 GC9107 display, 1 button)
;
; Build:  pio run
; Upload: pio run -t upload

[env:m5stack-atoms3]
platform  = espressif32
board     = m5stack-atoms3
framework = arduino

build_flags =
    -std=gnu++17
    -O2
    ; AtomS3 display is 128x128
    -DXMC_DISPLAY_WIDTH=128
    -DXMC_DISPLAY_HEIGHT=128

extra_scripts = extra_scripts.py

; Only the app source is in src/; platform + library sources are added by the
; extra script.
src_dir = src
